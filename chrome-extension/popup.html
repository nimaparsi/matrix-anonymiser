<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanitise AI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="popup">
      <span class="badge">Privacy First</span>
      <h1>Sanitise AI</h1>
      <p class="subtitle">Sanitise sensitive text before sending it to AI.</p>
      <p class="trust">No prompt data is stored. Text is anonymised before AI use.</p>

      <section class="settings">
        <label class="toggle-row" for="auto-mode-toggle">
          <input id="auto-mode-toggle" type="checkbox" />
          <span>Automatic mode (sanitise before send)</span>
        </label>
      </section>

      <section class="quick-tool">
        <label for="quick-input">Quick sanitise</label>
        <textarea id="quick-input" rows="4" placeholder="Paste text to anonymise..."></textarea>
        <button id="quick-sanitise" class="primary">Sanitise</button>
        <p id="quick-status" class="status" aria-live="polite"></p>
      </section>

      <button id="open-sanitise" class="secondary">Open Sanitise AI</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
